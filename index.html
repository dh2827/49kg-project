<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css">
<title>49kg Project v0.4</title></head><body>
<div class="wrap">
<h1>💙 49kg Project</h1>
<div class="card">
<div class="top"><span>目前體重</span><b id="cw">55.7 kg</b></div>
<div class="bar"><div id="fill"></div></div>
<p id="goal"></p>
<input id="w" type="number" step="0.1" placeholder="今天體重">
<button onclick="save()">儲存</button>
<canvas id="chart" width="360" height="120"></canvas>
</div>

<div class="card">
<h2>🍱 智慧抽餐</h2>
<select id="mode">
<option value="all">全部</option>
<option value="meat">今天想吃肉</option>
<option value="cheap">今天想省錢</option>
<option value="store">今天超商</option>
</select>
<button onclick="draw()">🎲 抽餐</button>
<div id="meal"></div>
</div>

<div class="card">
<h2>🏆 成就</h2>
<div id="badges"></div>
</div>
</div>
<script src="app.js"></script></body></html>

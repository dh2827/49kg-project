<!doctype html><html lang="zh-Hant"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="manifest" href="manifest.json"><link rel="stylesheet" href="style.css">
<title>49kg Project v0.4</title></head><body>
<div class="wrap">
<h1>💙 49kg Project</h1>
<div class="card">
<div class="top"><span>目前體重</span><b id="cw">55.7 kg</b></div>
<div class="bar"><div id="fill"></div></div>
<p id="goal"></p>
<input id="w" type="number" step="0.1" placeholder="今天體重">
<button onclick="save()">儲存</button>
<canvas id="chart" width="360" height="120"></canvas>
</div>

<div class="card">
<h2>🍳 早餐 / 🌙 晚餐</h2>
<button onclick="drawBreakfast()">🎲 抽早餐</button>
<button onclick="drawDinner()">🎲 抽晚餐</button>
<h3>我的餐點資料庫</h3>
<select id="mealType"><option value="breakfast">早餐</option><option value="dinner">晚餐</option></select>
<input id="foodName" placeholder="新增餐點">
<button onclick="addFood()">新增</button>
<div id="meal"></div>
</div>

<div class="card">
<h2>🏆 成就</h2>
<div id="badges"></div>
</div>
</div>
<div class="card"><h2>💧 每日打卡</h2><p>喝水：<span id="waterVal">0</span> ml</p><button onclick="addWater()">+250 ml</button><p>運動：<input id="exercise" placeholder="例如：快走30分鐘"></p><button onclick="saveExercise()">儲存運動</button><p>連續打卡：<b id="streak">0</b> 天</p></div><script src="app.js"></script></body></html>
